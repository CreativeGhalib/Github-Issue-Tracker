<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G I T | Login</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- stylecss -->
    <link rel="stylesheet" href="Styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body class="min-h-screen overflow-hidden bg-[#eff1f5] flex flex-col items-center justify-center px-4 font-[Geist]">
    <div class="w-full max-w-[424px] bg-white rounded-t-lg shadow-[0_6px_18px_rgba(15,23,42,0.08)]">
      <div class="logo flex justify-center pt-8">
        <img src="assets/github-logo.png" alt="GitHub Logo Image " class="h-[82px] w-[82px] object-contain">
      </div>
      <div class="title text-center pt-6 px-7">
        <h1 class="text-[30px] leading-tight font-bold text-[#1F2937] whitespace-nowrap">GitHub Issues Tracker</h1>
        <p class="text-base text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <!-- login form -->
    </div>
    <form class="card bg-white w-full max-w-[424px] mx-auto mt-0 rounded-none shadow-none">
      <div class="card-body px-7 py-5">
        <fieldset class="fieldset">
          <label class="label text-black">Username</label>
          <input id="input-username" maxlength='5' type="text" autocomplete="username"
            class="input h-11 w-full rounded-md border border-gray-300 bg-white text-base placeholder:text-[#94A3B8] "
            value="admin" placeholder="Enter Username" />
          <a class="link link-hover text-[#4A00FF]">Default: admin</a>
          <label class="label">Password</label>
          <input id="input-password" maxlength='8' type="password" autocomplete="current-password"
            class="input h-11 w-full rounded-md border border-gray-300 bg-white text-base placeholder:text-[#94A3B8]"
            value="admin123" placeholder="Enter Password" />
          <div><a class="link text-[#4A00FF] link-hover">Password:admin123</a></div>
          <button id="signin-btn"
            class="btn btn-neutral rounded-[8px] border-0 bg-[#4A00FF] mt-4 h-11 text-base font-semibold normal-case">Sign
            in</button>
        </fieldset>
      </div>
    </form>
    <div class="w-full max-w-[424px] mx-auto bg-white px-7 flex items-center py-2 text-[#64748B]">
      <div class="flex-1 border-t border-gray-300"></div>
      <span class="px-3 text-sm">OR</span>
      <div class="flex-1 border-t border-gray-300"></div>
    </div>
    <p class="w-full max-w-[424px] mx-auto bg-white text-center text-sm text-[#64748B] pt-2 pb-2">Demo Credentials:</p>
    <div class="w-full max-w-[424px] mx-auto rounded-b-lg bg-white px-7 pb-6 shadow-[0_6px_18px_rgba(15,23,42,0.08)]">
      <div class="rounded-lg bg-gray-100 px-6 py-5 text-center">
        <p class="text-[15px]">
          <span class="font-semibold">Username:</span> admin
        </p>
        <p class="text-[15px]">
          <span class="font-semibold">Password:</span> admin123
        </p>
      </div>
    </div>

    <script src="./scripts/login.js"></script>
  </body>

</html>
